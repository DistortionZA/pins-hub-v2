services:
  postgres:
    image: postgres:16-alpine
    container_name: pins_hub_v2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pins_hub_v2
      POSTGRES_USER: pins_hub_v2_dev
      POSTGRES_PASSWORD: pins_hub_v2_dev_password
    ports:
      - "55432:5432"
    volumes:
      - pins_hub_v2_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pins_hub_v2_dev -d pins_hub_v2"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: pins_hub_v2_adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pins_hub_v2_postgres_data:
